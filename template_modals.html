<!-- ── TEMPLATES LIST MODAL (Новая) ── -->
<div class="modal-overlay" id="templates-list-modal" onclick="closeTemplatesListModal(event)">
<div class="modal-box" style="max-height:80vh;">
    <div class="modal-head">
      <span class="modal-title">🎭 Список шаблонов</span>
      <button class="modal-close" onclick="closeTemplatesListModal()">✕</button>
    </div>
    <div class="modal-body" id="templates-list-container" style="max-height:500px; overflow-y:auto; padding:8px;">
      <div class="modal-empty">Загрузка...</div>
    </div>
    <div style="padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end;">
      <button onclick="openCreateTemplateModal()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:8px; color:#fff; cursor:pointer; font-size:14px;">➕ Создать пустой шаблон</button>
      <button onclick="closeTemplatesListModal()" style="padding:10px 20px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer; font-size:14px;">✕ Закрыть</button>
    </div>
</div>
</div>

<!-- ── CREATE TEMPLATE MODAL (Новая - пустой шаблон) ── -->
<div class="modal-overlay" id="create-template-modal" onclick="closeCreateTemplateModal(event)">
<div class="modal-box" style="max-width:500px;">
    <div class="modal-head">
      <span class="modal-title">🎭 Создание нового шаблона</span>
      <button class="modal-close" onclick="closeCreateTemplateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
        <div>
          <label style="display:block; font-size:11px; color:var(--muted); font-family:var(--font-mono); margin-bottom:4px;">ID шаблона</label>
          <input type="text" id="create-template-id" placeholder="manga-drama" style="width:100%; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:13px;">
        </div>
        <div>
          <label style="display:block; font-size:11px; color:var(--muted); font-family:var(--font-mono); margin-bottom:4px;">Название</label>
          <input type="text" id="create-template-name" placeholder="Манга-драма v1" style="width:100%; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:13px;">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
        <div>
          <label style="display:block; font-size:11px; color:var(--muted); font-family:var(--font-mono); margin-bottom:4px;">Категория</label>
          <input type="text" id="create-template-category" placeholder="Развлекательное" style="width:100%; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:13px;">
        </div>
        <div>
          <label style="display:block; font-size:11px; color:var(--muted); font-family:var(--font-mono); margin-bottom:4px;">Язык</label>
          <select id="create-template-language" style="width:100%; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:13px;">
            <option value="ru">Русский (ru)</option>
            <option value="en">English (en)</option>
          </select>
        </div>
      </div>

      <div style="margin-bottom:12px;">
        <label style="display:block; font-size:11px; color:var(--muted); font-family:var(--font-mono); margin-bottom:4px;">Описание</label>
        <textarea id="create-template-description" placeholder="Описание нового шаблона..." style="width:100%; height:60px; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:13px; resize:vertical;"></textarea>
      </div>

      <div style="margin-bottom:12px; padding:12px; background:#070710; border-radius:6px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <label style="display:block; font-size:11px; color:var(--accent2); font-family:var(--font-mono);">Stage 1 Writer (основной промпт)</label>
          <button onclick="addNewStage1Writer()" style="padding:4px 10px; font-size:10px; background:var(--accent); border:none; border-radius:4px; color:#fff; cursor:pointer;">➕</button>
        </div>
        <textarea id="create-template-stage-1-writer" placeholder="Ты — сценарный движок..." style="width:100%; height:120px; padding:8px; background:#0a0a12; border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:11px; resize:vertical;"></textarea>
        <div style="font-size:10px; color:var(--muted); margin-top:4px;">
          Пример: используй разделители ---STORY---, ---EPISODE---, ---POLISH---
        </div>
      </div>

      <div style="margin-bottom:12px;">
        <label style="display:block; font-size:11px; color:var(--accent2); font-family:var(--font-mono); margin-bottom:4px;">Stage 1 Extractor</label>
        <textarea id="create-template-stage-1-extractor" placeholder="Role: Technical Character Extractor..." style="width:100%; height:80px; padding:8px; background:#070710; border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:11px; resize:vertical;"></textarea>
      </div>

      <div style="margin-bottom:12px;">
        <label style="display:block; font-size:11px; color:var(--accent2); font-family:var(--font-mono); margin-bottom:4px;">Stage 2 Scenes</label>
        <textarea id="create-template-stage-2-scenes" placeholder="Role: Video Production Director..." style="width:100%; height:80px; padding:8px; background:#070710; border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--font-mono); font-size:11px; resize:vertical;"></textarea>
      </div>

      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button onclick="closeCreateTemplateModal()" style="padding:8px 16px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text); cursor:pointer; font-family:var(--font-mono); font-size:12px;">Отмена</button>
        <button onclick="saveNewTemplate()" style="padding:8px 16px; background:var(--accent); border:none; border-radius:6px; color:#fff; cursor:pointer; font-family:var(--font-mono); font-size:12px;">💾 Создать шаблон</button>
      </div>
    </div>
</div>
</div>
